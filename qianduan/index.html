<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豫田智保 - 农险精细化查勘定损平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-container">
                <h2>豫田智保 SaaS</h2>
                <p class="subtitle">农险精细化查勘定损平台</p>
            </div>

            <div class="control-panel">
                <div class="search-bar-inline">
                    <input type="text" id="searchInput" placeholder="输入村镇或地址定位...">
                    <button id="btnSearch">定位</button>
                </div>

                <h3>底图控制 (宏观寻路)</h3>
                <div class="basemap-toggles">
                    <button id="btn-vector" class="btn active">矢量路网 (寻路)</button>
                    <button id="btn-satellite" class="btn">天地图影像 (最高18级)</button>
                </div>
                
                <hr class="divider">

                <h3>高分影像接入 (微观定损)</h3>
                <p class="help-text" style="font-size: 12px; margin-bottom: 8px;">解决卫星影像放大后模糊、无数据的问题。</p>
                <input type="file" id="drone-upload-input" accept=".tif,.tiff" style="display: none;">
                <button id="btn-upload-drone" class="btn drone-btn">🚁 上传无人机正射影像 (DOM)</button>

                <hr class="divider">
                
                <h3>智能查勘工具</h3>
                <button id="btn-analyze" class="btn action-btn primary" disabled>🚀 极速智能定损 (请先画图)</button>
            </div>

            <div id="report-panel" class="report-panel" style="display: none;">
                <h3>📊 智能定损分析报告</h3>
                <div class="report-content" id="report-content"></div>
                <div class="chart-container">
                    <canvas id="spectralChart"></canvas>
                </div>
                <div class="report-explanation" id="report-explanation"></div>
            </div>
        </aside>

        <main class="main-content">
            <div id="viewDiv"></div>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
