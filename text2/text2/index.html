<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农险理赔系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="auth-shell">
        <section class="auth-panel">
            <header class="auth-header">
                <h1>农险理赔系统</h1>
                <p>请输入账号信息后进入系统。</p>
            </header>

            <div class="auth-tabs">
                <button id="tabLogin" class="auth-tab active" type="button">登录</button>
                <button id="tabRegister" class="auth-tab" type="button">注册</button>
            </div>

            <form id="loginForm" class="auth-form">
                <label>账号</label>
                <input id="loginUsername" type="text" autocomplete="username" required>
                <label>密码</label>
                <input id="loginPassword" type="password" autocomplete="current-password" required>
                <button class="btn btn-primary" type="submit">登录系统</button>
            </form>

            <form id="registerForm" class="auth-form hidden">
                <label>账号</label>
                <input id="registerUsername" type="text" autocomplete="username" required>
                <label>密码</label>
                <input id="registerPassword" type="password" autocomplete="new-password" required>
                <label>确认密码</label>
                <input id="registerPasswordConfirm" type="password" autocomplete="new-password" required>
                <label>角色</label>
                <select id="registerRole">
                    <option value="surveyor">查勘员</option>
                    <option value="reviewer">复核员</option>
                </select>
                <button class="btn btn-primary" type="submit">注册账号</button>
            </form>

            <p class="form-message" id="authMessage"></p>

            <footer class="auth-footer">
                <p>默认账号：`surveyor01` / `reviewer01` / `admin01`，密码均为 `123456`。</p>
            </footer>
        </section>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
