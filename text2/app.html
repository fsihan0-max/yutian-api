<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农险理赔系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.js"></script>
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>
</head>
<body class="admin-body">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-block">
                <strong>农险理赔系统</strong>
                <span id="roleLabel"></span>
            </div>

            <div class="user-block">
                <p id="currentUserName"></p>
                <small id="currentRoleName"></small>
            </div>

            <nav id="menuList" class="menu-list"></nav>

            <button id="logoutBtn" type="button" class="btn btn-danger">退出登录</button>
        </aside>

        <div class="main-shell">
            <header class="topbar">
                <h1 id="pageTitle">工作台</h1>
                <div class="topbar-right">
                    <span class="badge" id="healthBadge">服务检测中</span>
                    <span class="badge" id="dateBadge"></span>
                </div>
            </header>

            <main class="content">
                <section class="page active" data-page="workbench">
                    <div class="metrics-grid" id="workbenchMetrics"></div>
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title" id="workbenchTodoTitle">我的待办</div>
                            <div id="todoList" class="item-list"></div>
                        </article>
                        <article class="panel">
                            <div class="panel-title">异常预警</div>
                            <div id="warningList" class="item-list"></div>
                        </article>
                    </div>
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title" id="workbenchRecentTitle">最近处理案件</div>
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>案件号</th>
                                        <th>乡镇</th>
                                        <th>作物</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody id="recentCaseRows"></tbody>
                            </table>
                        </article>
                        <article class="panel">
                            <div class="panel-title">快捷入口</div>
                            <div id="quickActions" class="quick-grid"></div>
                        </article>
                    </div>
                </section>

                <section class="page" data-page="survey">
                    <div class="subtabs">
                        <button class="subtab active" data-survey-tab="damage" type="button">智能定损</button>
                        <button class="subtab" data-survey-tab="history" type="button">历史对比</button>
                        <button class="subtab" data-survey-tab="sample" type="button">样本标注</button>
                        <button class="subtab" data-survey-tab="field" type="button">外业取证</button>
                    </div>

                    <div class="subpage active" data-subpage="damage">
                        <div class="survey-layout">
                            <article class="panel">
                                <div class="form-row">
                                    <input id="searchInput" type="text" placeholder="输入乡镇或地址">
                                    <button class="btn" id="btnSearch" type="button">定位</button>
                                </div>
                                <div class="form-row">
                                    <select id="cropModeSelect">
                                        <option value="wheat">小麦</option>
                                        <option value="corn">玉米</option>
                                    </select>
                                    <select id="modelModeSelect">
                                        <option value="rule">规则判定</option>
                                        <option value="ml">机器学习判定</option>
                                    </select>
                                </div>
                                <div class="form-row wrap">
                                    <button class="btn btn-small active" data-theme-key="ndvi" type="button">NDVI</button>
                                    <button class="btn btn-small" data-theme-key="ndre" type="button">NDRE</button>
                                    <button class="btn btn-small" data-theme-key="evi2" type="button">EVI2</button>
                                    <button class="btn btn-small" data-theme-key="ndmi" type="button">NDMI</button>
                                    <button class="btn btn-small" data-theme-key="bsi" type="button">BSI</button>
                                </div>
                                <div class="form-row">
                                    <input id="droneUploadInput" type="file" accept=".tif,.tiff">
                                    <button class="btn btn-primary" id="btnAnalyze" type="button" disabled>开始分析</button>
                                </div>
                                <div class="result-block" id="analyzeResult"></div>
                            </article>
                            <article class="panel map-panel">
                                <div class="map-panel-header">
                                    <div class="panel-title">地图与 AOI</div>
                                    <div class="map-basemap-toggle">
                                        <button class="btn btn-small active" id="baseMapVecBtn" type="button">天地图矢量</button>
                                        <button class="btn btn-small" id="baseMapImgBtn" type="button">天地图卫星</button>
                                    </div>
                                </div>
                                <div id="viewDiv"></div>
                            </article>
                        </div>
                    </div>

                    <div class="subpage" data-subpage="history">
                        <article class="panel">
                            <div class="panel-title">历史对比</div>
                            <div class="item-list" id="historyList"></div>
                        </article>
                    </div>

                    <div class="subpage" data-subpage="sample">
                        <div class="two-col">
                            <article class="panel">
                                <div class="panel-title">标注操作</div>
                                <div class="form-row wrap">
                                    <button class="btn" data-sample-label="pest" type="button">标注病虫害</button>
                                    <button class="btn" data-sample-label="lodging" type="button">标注倒伏</button>
                                    <button class="btn" data-sample-label="harvest" type="button">标注收割</button>
                                    <button class="btn" data-sample-label="fallow" type="button">标注休耕</button>
                                </div>
                                <input id="sampleNoteInput" type="text" placeholder="标注备注">
                                <div class="panel-title minor-title">同地块特征</div>
                                <div class="item-list" id="featureList"></div>
                            </article>
                            <article class="panel">
                                <div class="panel-title">样本记录</div>
                                <div class="item-list" id="sampleList"></div>
                            </article>
                        </div>
                    </div>

                    <div class="subpage" data-subpage="field">
                        <div class="two-col">
                            <article class="panel">
                                <div class="panel-title">外业取证</div>
                                <input id="fieldPhotoInput" type="file" multiple accept="image/*">
                                <input id="fieldNoteInput" type="text" placeholder="证据说明">
                                <button class="btn" id="addFieldEvidenceBtn" type="button">加入证据清单</button>
                                <div class="item-list" id="fieldEvidenceList"></div>
                            </article>
                            <article class="panel">
                                <div class="panel-title">流程检查</div>
                                <div class="item-list" id="fieldChecklist"></div>
                            </article>
                        </div>
                    </div>
                </section>

                <section class="page" data-page="cases">
                    <article class="panel">
                        <div class="panel-title">案件列表</div>
                        <div class="form-row wrap">
                            <select id="caseFilterTown"></select>
                            <select id="caseFilterStatus"></select>
                            <select id="caseFilterCrop"></select>
                        </div>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>案件号</th>
                                    <th>乡镇/村</th>
                                    <th>作物</th>
                                    <th>查勘员</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody id="caseRows"></tbody>
                        </table>
                    </article>
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title">案件详情</div>
                            <div id="caseDetail" class="item-list"></div>
                        </article>
                        <article class="panel" id="reviewPanel">
                            <div class="panel-title">结果复核</div>
                            <div class="list-item hidden" id="reviewReadonlyHint">
                                <strong>当前角色无复核权限</strong>
                                <p>查勘员仅可查看案件详情，不能提交复核。</p>
                            </div>
                            <div id="reviewActionPanel">
                                <select id="reviewLabelSelect">
                                    <option value="病虫害">病虫害</option>
                                    <option value="物理倒伏">物理倒伏</option>
                                    <option value="正常收割">正常收割</option>
                                    <option value="休耕">休耕</option>
                                    <option value="非农地物">非农地物</option>
                                </select>
                                <input id="reviewAreaInput" type="number" step="0.1" placeholder="复核面积(亩)">
                                <textarea id="reviewCommentInput" placeholder="复核说明"></textarea>
                                <button class="btn btn-primary" id="submitReviewBtn" type="button">提交复核</button>
                            </div>
                            <div class="item-list" id="disputeList"></div>
                        </article>
                    </div>
                </section>

                <section class="page" data-page="reports">
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title">报告生成</div>
                            <div class="form-row wrap">
                                <button class="btn btn-primary" id="generateFarmerReportBtn" type="button">生成农户报告</button>
                                <button class="btn btn-primary" id="generateArchiveReportBtn" type="button">生成归档报告</button>
                                <button class="btn" id="exportPdfBtn" type="button">导出 PDF</button>
                            </div>
                            <div class="item-list" id="reportLogList"></div>
                        </article>
                        <article class="panel">
                            <div class="panel-title">证据清单</div>
                            <div class="item-list" id="evidenceList"></div>
                        </article>
                    </div>
                </section>

                <section class="page" data-page="risk">
                    <div class="metrics-grid" id="riskMetrics"></div>
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title">受灾面积排行</div>
                            <div class="chart-holder"><canvas id="riskAreaChart"></canvas></div>
                        </article>
                        <article class="panel">
                            <div class="panel-title">风险类型占比</div>
                            <div class="chart-holder"><canvas id="riskTypeChart"></canvas></div>
                        </article>
                    </div>
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title">区域态势</div>
                            <div class="item-list" id="regionTrendList"></div>
                        </article>
                        <article class="panel">
                            <div class="panel-title">资源调度</div>
                            <div class="item-list" id="dispatchList"></div>
                        </article>
                    </div>
                </section>

                <section class="page" data-page="data">
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title">影像与图层</div>
                            <div class="item-list" id="imageryList"></div>
                        </article>
                        <article class="panel">
                            <div class="panel-title">样本与模型</div>
                            <div class="item-list" id="modelList"></div>
                        </article>
                    </div>
                </section>

                <section class="page" data-page="settings">
                    <div class="two-col">
                        <article class="panel">
                            <div class="panel-title">用户信息</div>
                            <div class="item-list" id="profileList"></div>
                        </article>
                        <article class="panel">
                            <div class="panel-title">参数设置</div>
                            <div class="item-list" id="settingList"></div>
                        </article>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div class="modal hidden" id="reportModal" role="dialog" aria-modal="true" aria-labelledby="reportModalTitle">
        <div class="modal-mask" id="closeReportModalMask"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="reportModalTitle">报告预览</h2>
                <button class="btn btn-small" id="closeReportModalBtn" type="button">关闭</button>
            </div>
            <div class="modal-body" id="reportPreviewContent"></div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
